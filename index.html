<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube 좋아요 요약 - 2025.12.29</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            line-height: 1.6;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
            text-align: center;
        }
        .date {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }
        .category-section {
            margin-bottom: 40px;
        }
        .category-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .category-title {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }
        .category-count {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
        }
        .video-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        .video-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
            transform: translateY(-2px);
        }
        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        .video-title {
            font-size: 1.3em;
            color: #333;
            font-weight: bold;
            flex: 1;
            margin-right: 15px;
        }
        .video-title a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }
        .video-title a:hover {
            color: #764ba2;
        }
        .badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.8em;
            font-weight: bold;
            white-space: nowrap;
        }
        .badge-english {
            background: #d4edda;
            color: #155724;
        }
        .badge-general {
            background: #cce5ff;
            color: #004085;
        }
        .badge-whisper {
            background: #fff3cd;
            color: #856404;
            margin-left: 5px;
        }
        .video-meta {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }
        .video-summary {
            color: #444;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            white-space: pre-wrap;
            line-height: 1.8;
        }
        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 10px 20px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        .filter-btn:hover {
            background: #667eea;
            color: white;
        }
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid #e9ecef;
            color: #666;
        }
        @media (max-width: 768px) {
            .container { padding: 20px; }
            h1 { font-size: 1.8em; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 YouTube 좋아요 요약</h1>
        <div class="date">생성일시: 2025년 12월 29일 13:37</div>
        
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">총 요약 영상</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">영어 학습 콘텐츠</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">0</div>
                <div class="stat-label">Whisper 음성 인식</div>
            </div>
            <div class="stat-card">
                <div class="stat-number">1</div>
                <div class="stat-label">카테고리</div>
            </div>
        </div>
        
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterVideos('all')">전체</button>
            <button class="filter-btn" onclick="filterVideos('english')">영어학습</button>
            <button class="filter-btn" onclick="filterVideos('general')">일반</button>
            <button class="filter-btn" onclick="filterVideos('whisper')">Whisper 인식</button>
        </div>

        <footer>
            <p>Powered by Claude AI & Whisper | 생성: 2025-12-29 13:37:42</p>
        </footer>
    </div>
    
    <script>
        function filterVideos(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            const cards = document.querySelectorAll('.video-card');
            cards.forEach(card => {
                if (type === 'all') {
                    card.style.display = 'block';
                } else if (type === 'english') {
                    card.style.display = card.dataset.type === 'english_learning' ? 'block' : 'none';
                } else if (type === 'general') {
                    card.style.display = card.dataset.type === 'general' ? 'block' : 'none';
                } else if (type === 'whisper') {
                    card.style.display = card.dataset.method === 'whisper' ? 'block' : 'none';
                }
            });
        }
    </script>
</body>
</html>
